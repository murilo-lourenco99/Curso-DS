<!DOCTYPE html>
<html lang="en">

<head>

  <link rel="stylesheet" href="./css/style.css">
  <title>Notas de Alunos</title>

    <h2> Tabela de Notas </h2>

        <th>Nota 2</th>
        <th>Nota 3</th>
        <th>Média</th>
        <th>Status</th>
      </tr>
    </thead>

    <tbody>
      <tr>
        <td>Joseph</td>
        <td class="nota"><input type="number" placeholder="Nota 1"></td>
        <td class="nota"><input type="number" placeholder="Nota 2"></td>
        <td class="nota"><input type="number" placeholder="Nota 3"></td>
        <td class="media"></td>
        <td class="status"></td>
      </tr>
      <tr>
        <td>Doppio</td>
        <td class="nota"><input type="number" placeholder="Nota 1"></td>
        <td class="nota"><input type="number" placeholder="Nota 2"></td>
        <td class="nota"><input type="number" placeholder="Nota 3"></td>
        <td class="media"></td>
        <td class="status"></td>
      </tr>
      <tr>
        <td>Iggy</td>
        <td class="nota"><input type="number" placeholder="Nota 1"></td>
        <td class="nota"><input type="number" placeholder="Nota 2"></td>
        <td class="nota"><input type="number" placeholder="Nota 3"></td>
        <td class="media"></td>
        <td class="status"></td>
      </tr>
      <tr>
        <td>Joshu</td>
        <td class="nota"><input type="number" placeholder="Nota 1"></td>
        <td class="nota"><input type="number" placeholder="Nota 2"></td>
        <td class="nota"><input type="number" placeholder="Nota 3"></td>
        <td class="media"></td>
        <td class="status"></td>
      </tr>
    </tbody>

  </table>

  <button class="botaoCalculo" id="botaoCalculo">Calcular Média</button>

  <script src="./js/script.js"></script>
  <script src="./js/script2.js"></script>
</body>

</html>
